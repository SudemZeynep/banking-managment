<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bank | Management Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; }
        
        /* Navigasyon */
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 25px; box-sizing: border-box; }
        .nav-link { padding: 12px; display: flex; align-items: center; gap: 12px; color: #94a3b8; text-decoration: none; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        .nav-link.active, .nav-link:hover { background: var(--accent); color: white; }

        /* Ana İçerik */
        .content { margin-left: 260px; width: calc(100% - 260px); padding: 40px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        /* Kartlar */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .stat-val { font-size: 28px; font-weight: bold; color: var(--primary); }

        /* Etkileşim Alanı */
        .app-container { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        .glass-panel { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0 20px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #f1f5f9; color: #64748b; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        
        .pulse { width: 10px; height: 10px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 8px; animation: shadow-pulse 2s infinite; }
        @keyframes shadow-pulse { 0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.4); } 100% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--accent);"><i class="fas fa-vault"></i> BANK-OPS</h2>
    <nav style="margin-top: 40px;">
        <a href="#" class="nav-link active"><i class="fas fa-th-large"></i> Dashboard</a>
        <a href="#" class="nav-link"><i class="fas fa-exchange-alt"></i> Transferler</a>
        <a href="#" class="nav-link"><i class="fas fa-user-shield"></i> Müşteri Portföyü</a>
        <a href="#" class="nav-link"><i class="fas fa-file-invoice-dollar"></i> Raporlar</a>
    </nav>
</div>

<div class="content">
    <div class="header">
        <div>
            <h1 style="margin: 0;">Yönetim Paneli</h1>
            <p style="color: #64748b;"><span class="pulse"></span> Sunucu Durumu: AWS EC2 Canlı</p>
        </div>
        <div style="text-align: right;">
            <strong>Sudem Zeynep</strong><br>
            <small>Kıdemli Yazılım Mühendisi</small>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Toplam Müşteri</small>
            <div class="stat-val" id="totalCust">124</div>
        </div>
        <div class="stat-card">
            <small>Bekleyen İşlemler</small>
            <div class="stat-val">12</div>
        </div>
        <div class="stat-card">
            <small>Sistem Güvenliği</small>
            <div class="stat-val" style="color: var(--success);">%100</div>
        </div>
    </div>

    <div class="app-container">
        <div class="glass-panel">
            <h3><i class="fas fa-plus-circle"></i> Müşteri Kaydı</h3>
            <label>Müşteri Adı</label>
            <input type="text" id="nameInput" placeholder="Örn: Ali Yılmaz">
            
            <label>Hesap Türü</label>
            <select id="typeInput">
                <option value="Vadeli">Vadeli Hesap</option>
                <option value="Vadesiz">Vadesiz Hesap</option>
                <option value="Yatırım">Yatırım Hesabı</option>
            </select>
            
            <label>Bakiye (₺)</label>
            <input type="number" id="balanceInput" placeholder="0.00">
            
            <button class="btn-primary" onclick="processData()">Sisteme Kaydet</button>
        </div>

        <div class="glass-panel">
            <h3><i class="fas fa-database"></i> Veritabanı Kayıtları</h3>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Müşteri</th>
                        <th>Tür</th>
                        <th>Bakiye</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Mehmet Aksoy</td>
                        <td>Vadeli</td>
                        <td>₺25,400</td>
                        <td><i class="fas fa-ellipsis-h"></i></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let totalCount = 124;

    function processData() {
        const name = document.getElementById('nameInput').value;
        const type = document.getElementById('typeInput').value;
        const balance = document.getElementById('balanceInput').value;

        if(!name || !balance) {
            alert("Lütfen tüm alanları doldurun!");
            return;
        }

        // Tabloya ekle
        const table = document.getElementById('dataTable').getElementsByTagName('tbody')[0];
        const row = table.insertRow(0);
        row.innerHTML = `
            <td><b>${name}</b></td>
            <td>${type}</td>
            <td>₺${parseFloat(balance).toLocaleString()}</td>
            <td><i class="fas fa-check" style="color: var(--success);"></i></td>
        `;

        // Sayacı güncelle
        totalCount++;
        document.getElementById('totalCust').innerText = totalCount;

        // Temizle
        document.getElementById('nameInput').value = '';
        document.getElementById('balanceInput').value = '';
        
        console.log("Veri CI/CD üzerinden sunucuya iletildi.");
    }
</script>

</body>
</html>
