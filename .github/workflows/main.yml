name: Banking Management CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Adım 1: JAR Oluşturma (Doğru klasörde çalışır)
      - name: Build with Gradle
        working-directory: ./myapp/myapp
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # Adım 2: Dockerhub Login
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Adım 3: Docker Image Build & Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./myapp/myapp
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:latest

      # Adım 4: EC2 Üzerinde Canlıya Alma
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Dockerhub'dan en güncel imajı çek
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:latest
            
            # Varsa eski konteyneri durdur ve sil (Hata vermemesi için || true kullanıyoruz)
            sudo docker stop banking-container || true
            sudo docker rm banking-container || true
            
            # Uygulamayı 8080 portunda arka planda başlat
            sudo docker run -d --name banking-container -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/banking-app:latest
